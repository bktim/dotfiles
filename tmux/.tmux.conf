set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc"
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g status-keys vi

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

set -g status-left-length 30
set -g status-right-length 60
set -g status-left '#S '
set -g status-right '#{?client_prefix,#[fg=colour231,bg=colour160] PREFIX #[default],} %Y-%m-%d %H:%M '

bind s split-window -v   # horizontal split (pane on right)
bind v split-window -h   # horizontal split (pane on right)
